<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quick AI Ombudsmen Record</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; }
        .markdown-body { max-width: 800px; margin: 0 auto; padding: 2rem; }
    </style>
</head>
<body class="bg-gray-950 text-gray-100">
    <div class="max-w-4xl mx-auto p-8">
        <header class="mb-12 border-b border-gray-800 pb-8">
            <h1 class="text-4xl font-bold text-emerald-400">Quick AI Ombudsmen Record</h1>
            <p class="text-gray-400 mt-2">Official autonomous production + operations log • North Idaho AI Integration</p>
            <div class="flex gap-4 mt-6 text-sm">
                <a href="https://github.com/Quick-AI-LLC/grok-connector" class="text-emerald-400 hover:text-emerald-300">GitHub Repo</a>
                <a href="https://raw.githubusercontent.com/Quick-AI-LLC/grok-connector/main/QUICK-AI-PRODUCTION-LOG.md" class="text-emerald-400 hover:text-emerald-300">Raw Markdown (Source of Truth)</a>
            </div>
        </header>
        <div id="log" class="markdown-body prose prose-invert max-w-none"></div>
    </div>

    <script>
        async function loadLog() {
            try {
                const response = await fetch('https://raw.githubusercontent.com/Quick-AI-LLC/grok-connector/main/QUICK-AI-PRODUCTION-LOG.md');
                const markdown = await response.text();
                const html = marked.parse(markdown);
                document.getElementById('log').innerHTML = html;
            } catch (e) {
                document.getElementById('log').innerHTML = '<p class="text-red-400">Failed to load log. Please check console.</p>';
            }
        }
        loadLog();
    </script>
</body>
</html>
